<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PHP Index Generator - 웹 검색</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            background: white;
            padding: 30px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
        }

        .stat-label {
            font-size: 12px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: bold;
            color: #333;
        }

        .search-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        #searchInput {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        #searchInput:focus {
            outline: none;
            border-color: #667eea;
        }

        .filters {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 15px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
            font-weight: 500;
        }

        .filter-btn:hover {
            border-color: #667eea;
            color: #667eea;
        }

        .filter-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .results-section {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .results-header {
            margin-bottom: 20px;
        }

        .results-count {
            font-size: 18px;
            font-weight: 600;
            color: #333;
        }

        .results-count span {
            color: #667eea;
        }

        .result-item {
            padding: 15px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            margin-bottom: 15px;
            transition: all 0.3s;
            cursor: pointer;
        }

        .result-item:hover {
            background: #f9f9f9;
            border-color: #667eea;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.1);
        }

        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            margin-bottom: 10px;
        }

        .result-symbol {
            font-size: 16px;
            font-weight: 600;
            color: #333;
        }

        .result-type {
            display: inline-block;
            padding: 4px 8px;
            background: #e8eaf6;
            color: #667eea;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .result-type.function {
            background: #fff3e0;
            color: #f57c00;
        }

        .result-type.class {
            background: #f3e5f5;
            color: #7b1fa2;
        }

        .result-type.method {
            background: #e0f2f1;
            color: #00695c;
        }

        .result-location {
            font-size: 13px;
            color: #666;
            margin-bottom: 8px;
        }

        .result-file {
            font-family: 'Courier New', monospace;
            color: #667eea;
        }

        .result-params {
            font-size: 12px;
            color: #999;
            font-family: 'Courier New', monospace;
            margin-top: 8px;
        }

        .score {
            font-size: 12px;
            color: #999;
        }

        .no-results {
            text-align: center;
            padding: 40px 20px;
            color: #999;
        }

        .no-results-icon {
            font-size: 48px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #667eea;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            font-size: 13px;
        }

        .badge {
            display: inline-block;
            padding: 2px 6px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 3px;
            font-size: 12px;
            margin-left: 8px;
        }

        @media (max-width: 768px) {
            header {
                padding: 20px;
            }

            .search-box {
                flex-direction: column;
            }

            .filters {
                flex-direction: column;
            }

            .filter-btn {
                width: 100%;
            }

            .stat-value {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 헤더 -->
        <header>
            <h1>🔍 PHP Index Generator</h1>
            <p style="color: #666; margin-top: 5px;">레거시 PHP 5.6 코드 검색 엔진</p>

            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">총 파일</div>
                    <div class="stat-value" id="totalFiles">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">추출된 심볼</div>
                    <div class="stat-value" id="totalSymbols">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">색인 생성</div>
                    <div class="stat-value" id="buildTime">0ms</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">PHP 버전</div>
                    <div class="stat-value" id="phpVersion">5.6</div>
                </div>
            </div>
        </header>

        <!-- 검색 섹션 -->
        <div class="search-section">
            <div class="search-box">
                <input
                    type="text"
                    id="searchInput"
                    placeholder="함수, 클래스, 메서드 검색... (예: send_header, Helper)"
                    autofocus
                >
            </div>

            <div class="filters">
                <button class="filter-btn active" data-type="all">모두</button>
                <button class="filter-btn" data-type="function">함수</button>
                <button class="filter-btn" data-type="class">클래스</button>
                <button class="filter-btn" data-type="method">메서드</button>
            </div>
        </div>

        <!-- 결과 섹션 -->
        <div class="results-section">
            <div class="results-header">
                <div class="results-count">
                    검색 결과: <span id="resultCount">0</span>개
                </div>
            </div>
            <div id="results"></div>
        </div>
    </div>

    <footer>
        🤖 PHP Index Generator v1.0.0 | 레거시 PHP 코드 분석 도구
    </footer>

    <script src="app.js"></script>
</body>
</html>
