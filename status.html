<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>System Status Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0d1117 0%, #161b22 100%);
      color: #c9d1d9;
      padding: 40px 20px;
      min-height: 100vh;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    header {
      text-align: center;
      margin-bottom: 50px;
      padding: 20px;
      background: rgba(22, 27, 34, 0.5);
      border-radius: 12px;
      border: 1px solid #30363d;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 10px;
      background: linear-gradient(120deg, #58a6ff, #79c0ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .time {
      font-size: 12px;
      color: #8b949e;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
      gap: 20px;
      margin-bottom: 30px;
    }

    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 24px;
      transition: all 0.3s ease;
    }

    .card:hover {
      border-color: #58a6ff;
      box-shadow: 0 0 20px rgba(88, 166, 255, 0.1);
    }

    .card h2 {
      font-size: 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .emoji { font-size: 24px; }

    .count {
      background: rgba(88, 166, 255, 0.1);
      color: #58a6ff;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      border: 1px solid #30363d;
    }

    .items {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .item {
      padding: 12px;
      background: rgba(13, 17, 23, 0.5);
      border-left: 3px solid #30363d;
      border-radius: 6px;
      font-size: 13px;
      transition: all 0.2s;
    }

    .item:hover {
      background: rgba(88, 166, 255, 0.05);
      border-left-color: #58a6ff;
    }

    .item-name {
      font-weight: 600;
      color: #79c0ff;
    }

    .item-desc {
      font-size: 12px;
      color: #8b949e;
      margin-top: 4px;
    }

    .status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 8px;
    }

    .status.active {
      background: #3fb950;
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.5);
    }

    .status.inactive {
      background: #da3633;
    }

    .footer {
      text-align: center;
      padding: 20px;
      color: #8b949e;
      font-size: 12px;
      border-top: 1px solid #30363d;
      margin-top: 40px;
    }

    .footer a {
      color: #58a6ff;
      text-decoration: none;
    }

    .footer a:hover {
      text-decoration: underline;
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📊 System Status Dashboard</h1>
      <div class="time">Last updated: <span id="time"></span></div>
    </header>

    <div class="grid" id="grid"></div>

    <div class="footer">
      🚀 <strong>ppomppu-crawler MCP</strong> |
      <a href="javascript:location.reload()">새로고침</a> |
      <code>npm run status</code> for CLI version
    </div>
  </div>

  <script>
    const data = {
      mcp: {
        "filesystem": { args: ["/"] },
        "npm-scripts": { args: ["mcp-servers/npm-scripts.js"] },
        "doc-generator": { args: ["mcp-servers/doc-generator.js"] },
        "myawsdb": { args: ["mcp-servers/myawsdb.js"] },
        "ppomppu-crawler": { args: ["mcp-servers/ppomppu-crawler/ppomppu-crawler.js"] },
        "system-dashboard": { args: ["mcp-servers/system-dashboard.js"] }
      },
      plugins: {
        "php-code-migrator": {
          enabled: true,
          version: "1.0.0",
          description: "PHP 5.6 레거시 코드를 현대적인 Static 메소드 클래스로 자동 변환"
        },
        "fetch-and-summarize": {
          enabled: true,
          version: "1.0.0",
          description: "뽐뿌 게시판 데이터를 자동으로 가져와 분석하고 요약"
        },
        "board-explorer": {
          enabled: false,
          version: "0.1.0",
          description: "뽐뿌의 다양한 게시판을 탐색하고 관리"
        }
      },
      skills: {
        "analyze-freeboard": {
          enabled: true,
          description: "뽐뿌 자유게시판 현황을 CSV에서 분석하고 요약"
        },
        "fetch-and-summarize": {
          enabled: true,
          description: "뽐뿌 freeboard 최신 데이터를 가져와서 자동으로 분석하고 요약"
        },
        "system-status": {
          enabled: true,
          description: "View MCP servers, plugins, and skills status"
        },
        "multi-board-analysis": {
          enabled: false,
          description: "여러 게시판을 동시에 분석하고 비교"
        }
      }
    };

    function renderStatus() {
      const grid = document.getElementById('grid');

      // MCP Servers
      const mcpServers = Object.entries(data.mcp);
      const mcpCard = createCard('📡', 'MCP Servers', mcpServers.length);
      mcpServers.forEach(([name, config]) => {
        const args = config.args?.[0] || 'N/A';
        mcpCard.appendChild(createItem(name, args, true));
      });
      grid.appendChild(mcpCard);

      // Plugins
      const plugins = Object.entries(data.plugins);
      const activePlugins = plugins.filter(([,p]) => p.enabled).length;
      const pluginCard = createCard('🔌', 'Plugins', `${activePlugins}/${plugins.length}`);
      plugins.forEach(([name, info]) => {
        const item = createItem(name, info.description, info.enabled);
        pluginCard.appendChild(item);
      });
      grid.appendChild(pluginCard);

      // Skills
      const skills = Object.entries(data.skills);
      const activeSkills = skills.filter(([,s]) => s.enabled).length;
      const skillCard = createCard('⚡', 'Skills', `${activeSkills}/${skills.length}`);
      skills.forEach(([name, info]) => {
        const item = createItem(name, info.description, info.enabled);
        skillCard.appendChild(item);
      });
      grid.appendChild(skillCard);

      document.getElementById('time').textContent = new Date().toLocaleString('ko-KR');
    }

    function createCard(emoji, title, count) {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <h2>
          <span class="emoji">${emoji}</span>
          <span>${title}</span>
          <span class="count">${count}</span>
        </h2>
        <div class="items"></div>
      `;
      return card;
    }

    function createItem(name, desc, enabled) {
      const item = document.createElement('div');
      item.className = 'item';
      const statusClass = enabled ? 'active' : 'inactive';
      item.innerHTML = `
        <div>
          <span class="status ${statusClass}"></span>
          <span class="item-name">${name}</span>
        </div>
        <div class="item-desc">${desc}</div>
      `;
      const itemsContainer = document.querySelector('.card:last-child .items');
      if (itemsContainer) {
        itemsContainer.appendChild(item);
      }
      return item;
    }

    renderStatus();
    setInterval(renderStatus, 30000);
  </script>
</body>
</html>
